version: '3.9'
services: 
 michael:
  image: ghcr.io/michaeldlt1/holaflask:1.0.0
  networks: 
  - traefik-public
  deploy: 
   replicas: 1
   update_config:
    parallelism: 1
    delay: 10s
   restart_policy:
    condition: on-failure
   labels:
        - "traefik.enable=true"
        - "traefik.http.routers.michael.entrypoints=http"
        - "traefik.http.routers.michael.rule=Host(`michael.byronrm.com`)"
        - "traefik.http.routers.michael.service=michael"
        - "traefik.http.middlewares.michael-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.michael.middlewares=michael-https-redirect"
        - "traefik.http.routers.michael-secure.entrypoints=https"
        - "traefik.http.routers.michael-secure.rule=Host(`michael.byronrm.com`)"
        - "traefik.http.routers.michael-secure.tls=true"
        - "traefik.http.routers.michael-secure.tls.certresolver=http"
        - "traefik.http.routers.michael-secure.service=michael"
        - "traefik.http.services.michael.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true