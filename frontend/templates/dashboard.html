{% extends 'base.html' %}
{% block title %}Panel - Hola Flask{% endblock %}

{% block content %}
<section class="card">
  <h2>Usuarios registrados</h2>
  {% if users %}
    <ul>
      {% for user in users %}
        <li><strong>{{ user.name }}</strong> — {{ user.email }}</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Aún no hay usuarios registrados.</p>
  {% endif %}
</section>
{% endblock %}
