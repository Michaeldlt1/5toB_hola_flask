# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For mmore information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Flask apphola

on:
  push:
    branches: [ "main" ]


permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
         pip install -r requirements.txt

    - name: construir la imagen de Docker
      run: |
        docker build -t ghcr.io/michaeldlt1/holaflask:1.0.0 -t ghcr.io/michaeldlt1/holaflask:latest .

    - name: login hacia github container registry
      run: echo ${{ secrets.TOKEN_WR }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
    - name: publicar la imagen de Docker
      run: |
        docker push ghcr.io/michaeldlt1/holaflask:1.0.0
        docker push ghcr.io/michaeldlt1/holaflask:latest
    
    - name: mostrar las variables o secrets
      run: |
        echo ${{secrets.VPS_HOST}}
        echo ${{secrets.VPS_USER}}
        echo ${{secrets.VPS_PASSWORD}}
        echo ${{secrets.VPS_SSH_PORT}}
    
    - name: probar conexiones ssh
      uses: appleboy/ssh-action@v1
      with: 
        host: ${{secrets.VPS_HOST}}
        username: ${{secrets.VPS_USER}}
        password: ${{secrets.VPS_PASSWORD}}
        port: ${{secrets.VPS_SSH_PORT}}
        script: |
          echo "conexion exitosa"
          mkdir -p /home/${{secrets.VPS_USER}}/landingb
          touch /home/${{secrets.VPS_USER}}/landingb/ejemplo.txt
    - name: probar conexiones scp
      uses: appleboy/scp-action@v1
      with: 
        host: ${{secrets.VPS_HOST}}
        username: ${{secrets.VPS_USER}}
        password: ${{secrets.VPS_PASSWORD}}
        port: ${{secrets.VPS_SSH_PORT}}
        source: "stack.yml,Makefile"
        target: "/home/${{secrets.VPS_USER}}/landingb"
    
    - name: desplegando servicio
      uses: appleboy/ssh-action@v1
      with: 
        host: ${{secrets.VPS_HOST}}
        username: ${{secrets.VPS_USER}}
        password: ${{secrets.VPS_PASSWORD}}
        port: ${{secrets.VPS_SSH_PORT}}
        script: |
          echo "desplegando servicio"
          mkdir -p /home/${{secrets.VPS_USER}}/landingb
          cd /home/${{secrets.VPS_USER}}/landingb
          echo "${{ secrets.TOKEN_WR }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ghcr.io/michaeldlt1/holaflask:latest
          if ! docker info | grep -q 'Swarm: active'; then
            docker swarm init
          fi
          if docker network inspect proxy >/dev/null 2>&1; then
            if [ "$(docker network inspect proxy --format '{{.Scope}}')" != "swarm" ]; then
              echo "A local network named 'proxy' already exists. Remove it or use a different swarm network name."
              exit 1
            fi
          else
            docker network create --driver overlay --attachable proxy
          fi
          docker stack deploy -c stack.yml eliminar